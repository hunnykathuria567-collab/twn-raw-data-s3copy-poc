name: TWN Historical Data Ingestion

on:
  workflow_dispatch: # Manual trigger button in GitHub Actions tab

jobs:
  ingest_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Run High-Speed Ingestion Script
        run: |
          # Install AWS CLI (usually pre-installed, but ensuring it's ready)
          pip install boto3 
          python twn_api_s3_copy_script.py
